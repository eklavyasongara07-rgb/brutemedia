  SECTION 16 — FOUNDER MINDSET & EXECUTION
  ────────────────────────────────────────────────────────────────────────────

  PRIORITY STACKING (what actually moves the needle):
    #1: Close a paying client       (revenue, proof)
    #2: Deliver results that retain (trust, case study)
    #3: Get a referral or testimonial (warm leads)
    #4: Systematize delivery        (scale-readiness)
    #5: Build inbound (agency page) (Month 3+ activity only)

  PROCRASTINATION PATTERNS TO WATCH:
    ❌ Optimizing agency Instagram before having clients
    ❌ Building a fancy website before closing deals
    ❌ Creating decks and templates for work you don't have yet
    ❌ "Researching" instead of sending DMs
    ❌ Watching more courses instead of taking calls
    ✅ Replace all of the above with: Send 50 DMs. Book a call. Close a client.

  SPEED OVER PERFECTION:
    A good DM sent today beats a perfect DM sent next week.
    A delivered reel at 80% quality beats a perfect reel delivered 3 days late.
    A closed client at $900 beats a prospect nurtured for 2 weeks toward $1,200.

  METRICS THAT MATTER (by stage):
    Stage 0–1 clients:  DMs sent per day, calls booked per week
    Stage 1–5 clients:  Close rate, client retention, save rate improvements
    Stage 5–15 clients: Referral rate, client LTV, team quality, margin per client
    Stage 15+ clients:  Inbound leads, NPS, team performance, revenue per client

  DEADLINE-DRIVEN EXECUTION:
    Set 7-day sprints with a single measurable goal:
    "By Sunday: 3 calls booked."
    "By end of month: 1 paying client."
    "By Day 30: Client's save rate is above 5%."
    External accountability > internal motivation.

