  CALL SCRIPT:

  MIN 0–2 — Rapport & Frame:
    "Thanks for making the time. I want to make this practical — I'm going to walk
    you through exactly what I found in your audit, then you tell me if it makes sense.
    Does that work?"

  MIN 2–5 — Audit Presentation:
    "Looking at your last 10 reels: your save rate averages [X]%.
    Industry benchmark for coaches in your niche is 5%+.
    The gap is here — [specific problem: content mix / CTAs / posting time].
    Here's what's happening: [explain pattern in 60 seconds]."

  MIN 5–9 — Solution + Projections:
    "If we shift your content mix to 60% education, add specific CTAs,
    and post at [optimal time], here's the math:
    [Show funnel: views → saves → DMs → calls → clients → revenue]
    Month 1 target: 50–80 DMs.
    Month 2 target: 10–15 consultations.
    Month 3: 3–5 new paying clients from Instagram."

  MIN 9–13 — Offer + Price:
    "We handle all of it for $1,200/month.
    That's 15 reels, full strategy, weekly reporting.
    We're not charging for content — we're charging for the leads it generates.
    The moment you close 1 coaching client from our content, it pays for itself."

  MIN 13–15 — Close:
    "Do you want to start this week? I have [X] spots left this month."

  OBJECTION HANDLING:

  "It's too expensive."
    → "Compared to what? If 2 coaching clients pay you $1,000 each, that's $2,000 revenue
    from a $1,200 investment. You net $800 in month 1, then pure profit from month 2.
    It's not a cost. It's a growth lever."

  "I need to think about it."
    → "Totally fair. What specifically are you unsure about — the ROI, the process, or
    whether it'll work for your niche? Let me address that now so you have everything
    to make the decision."

  "Can you do it cheaper?"
    → "I have a Starter package at $600 — 8 reels, basic strategy. It gets results,
    but slower. The $1,200 package moves 2× faster because volume matters on Instagram.
    Which timeline works for you?"

  "I don't have time to review content."
    → "You review one batch of 4 reels per week. That's 20 minutes.
    Everything else — strategy, editing, captions, posting — is us.
    You get your time back and the leads come in."

  "I already tried this and it didn't work."
    → "Who did you work with, and what results did they show you?
    [Listen.] What I'm hearing is [X problem]. Here's why that's different
    from what we do: [specific differentiation]."

  "You only have 6 followers / You're new."
    → "You're right — I'm selective about who I take on while I build case studies.
    That's actually why I'm offering you exceptional results to build my proof.
    The strategy and framework I use is the same one already working for [niche type] coaches.
    I'm not asking for blind trust — I'm asking for 30 days and I'll show you the numbers."
    [Offer a reduced-risk entry: 30-day trial, partial prepay, or results guarantee.]

  LEAD QUALIFICATION FRAMEWORK (BANT):
    Budget:    "Are you currently investing in any marketing or content help?"
    Authority:  "Is it just you running the business, or do you have a team?"
    Need:       "How many coaching leads are you getting from Instagram right now?"
    Timeline:   "If the right solution showed up this week, are you ready to move?"

  REFERRAL PROGRAM:
    Offer existing clients: "Refer another coach → 1 month free or $200 cash."
    Track referrals in a simple CRM (Notion or Google Sheets).
    Trigger referral ask at Month 2 (after results are visible and client is happy).

  ────────────────────────────────────────────────────────────────────────────
  SECTION 5 — AUDIT FRAMEWORK (COMPLETE 7-STEP PROCESS)
  ────────────────────────────────────────────────────────────────────────────

  STEP 1 — GATHER DATA (15 min):
    For each of the last 10–15 reels, capture:
      Reel # | Views | Likes | Comments | Shares | Saves | Category | CTA? | Post Day | Post Time

  STEP 2 — CALCULATE RATES:
    Save Rate    = (Saves / Views) × 100
    Share Rate   = (Shares / Views) × 100
    Comment Rate = (Comments / Views) × 100
    Engagement   = ((Likes + Comments + Shares + Saves) / Views) × 100

  STEP 3 — IDENTIFY PATTERNS:
    - Best-performing content category (by save rate)
    - Worst-performing category (high views, low saves = wasted reach)
    - Best posting time (by average views)
    - CTA present vs absent performance gap
    - Caption length correlation with performance

  STEP 4 — DIAGNOSE PROBLEMS:
    □ Wrong content mix? (Too much motivation, not enough education)
    □ Weak or missing CTAs?
    □ Poor posting timing?
    □ Low saves despite decent views? (Content not saveable enough)
    □ No outcome tracking? (Measuring likes instead of DMs/leads)

  STEP 5 — PROJECT RESULTS:
    Current state: [metrics]
    After fixes (30 days): [projected metrics]
    Revenue impact: [conversion funnel calculation]

  STEP 6 — WRITE AUDIT SUMMARY (1 page):
    Header: === INSTAGRAM AUDIT: [Coach Name] ===
    Section 1: Current Performance (3–5 key metrics vs benchmarks)
    Section 2: Top 3 Problems (specific, data-backed)
    Section 3: What We'd Change (actionable, specific)
    Section 4: Projected Results (Month 1 targets)
    Section 5: Investment & Offer

  STEP 7 — CALL WALKTHROUGH:
    0–2 min:  Present findings
    2–5 min:  Explain the gap vs benchmarks
    5–9 min:  Solution + projections
    9–13 min: Offer + price
    13–15 min: Close

  AUDIT CHECKLIST:
    □ Pulled last 10–15 reels data
    □ Calculated save, share, engagement rates
    □ Identified best + worst content categories
    □ Identified posting time pattern
    □ Evaluated CTA effectiveness
    □ Written 1-page audit summary
    □ Projected results (30/60/90 days)
    □ Ready for call walkthrough

  ────────────────────────────────────────────────────────────────────────────
  SECTION 6 — CONTENT CREATION OPERATIONS
  ────────────────────────────────────────────────────────────────────────────

  CONTENT BATCHING WORKFLOW:
    Day 1 (Monday): Strategy sprint — plan 15 reels, write all hooks + scripts
    Day 2–3: Filming block (client or stock footage sourcing)
    Day 4–5: Editing (VA/editor processes all footage)
    Day 6: Review, caption writing, CTA finalization
    Day 7: Schedule via Later/Buffer, submit to client for approval

  VA HIRING GUIDE:
    Where: Onlinejobs.ph, Fiverr, Upwork
    Rate: $3–$8/hr for Philippines-based VAs; $15–25/hr for UK/US
    Skills needed: CapCut / Premiere Pro editing, Canva, Instagram scheduling
    Onboarding: Create Loom video SOPs for every recurring task
    KPIs: Reels delivered on time, edit quality score (1–5 rubric)

  VIDEO EDITING TOOLS:
    Mobile:  CapCut (free, fast, trending audio built-in)
    Desktop: Premiere Pro, DaVinci Resolve (free)
    Captions: Descript, Captions.ai, Submagic
    Graphics: Canva Pro ($12.99/mo — essential)

  CONTENT SCHEDULING TOOLS:
    Later (recommended for visual planning)
    Buffer (simpler, cheaper)
    Meta Business Suite (free, direct integration)

  PAYMENT & INVOICING:
    Stripe:  Best for international USD/GBP billing; 2.9% + 30¢ per transaction
    Wise:    Multi-currency (USD, GBP, EUR, INR) — low FX fees for cross-border
    PayPal:  Widely trusted but higher fees (3.49% international)
    Razorpay: Best for India-based clients (supports UPI, INR)
    Contracts: Use Bonsai or HelloSign for simple service agreements

  ────────────────────────────────────────────────────────────────────────────
  SECTION 7 — INSTAGRAM ALGORITHM & GROWTH
  ────────────────────────────────────────────────────────────────────────────

  ALGORITHM PHASES FOR EACH REEL:
    Phase 1 (0–1 hr):  Shown to followers. Engagement rate here determines Phase 2.
                       Target: >4% engagement in first hour.
    Phase 2 (1–6 hr):  Pushed to similar-interest non-followers.
                       Strong saves + shares drive this push.
    Phase 3 (6–24 hr): Explore / Suggested content distribution.
                       Rewatch rate and saves dominant signal here.
    Phase 4 (ongoing): Sustained reach if saves + shares keep accumulating.

  KEY ALGORITHM SIGNALS (ranked):
    1. Save rate      (future intent signal — tells IG the content is reference-worthy)
    2. Share rate     (social proof signal — tells IG the content spreads organically)
    3. Rewatch rate   (quality signal — people rewatching indicates value)
    4. Comment rate   (community signal — meaningful comments > generic)
    5. Like rate      (weakest signal; easy to inflate, least predictive)

  OPTIMAL POSTING TIMES (general, test per account):
    UK:    7–9 am, 12–1 pm, 6–8 pm GMT
    US:    7–9 am EST, 12–1 pm EST, 6–9 pm EST
    UAE:   6–8 am GST, 12–2 pm GST, 7–9 pm GST
    India: 7–9 am IST, 1–2 pm IST, 7–10 pm IST
    Rule:  Test 3 time slots for 30 days; drop the worst, double the best.

  POSTING FREQUENCY RECOMMENDATIONS:
    0–5k followers:     Daily (1 reel/day) — build volume
    5k–50k followers:   5–7 reels/week + 3–5 stories/day
    50k+ followers:     3–5 reels/week (quality > quantity at scale)

  FOLLOWER GROWTH EXPECTATIONS:
    Month 1 (cold start): 50–200 followers if posting daily + engaging
    Month 2–3:            200–500/month with consistent posting
    Month 4–6:            500–2,000/month with 1+ viral reel
    Month 7–12:           1,000–5,000/month with system in place

  SAVE VS SHARE VS COMMENT TRADE-OFFS:
    Save-heavy content (education, checklists):   High save rate, moderate views
    Share-heavy content (motivation, controversy): High share, high reach, low conversion
    Comment-heavy content (opinion, polls):        High community signal, moderate leads
    Best strategy: Prioritize saves for service businesses, shares for brand building.

