  SECTION 14 — DECISION TREES & TROUBLESHOOTING
  ────────────────────────────────────────────────────────────────────────────

  WHEN OUTREACH IS FAILING:
    □ Volume too low? → Send 50+ DMs/day, not 10
    □ Message too long? → Cut to 3 sentences, add specific insight
    □ No personalization? → Reference 1 specific thing from their profile
    □ Account looks empty/new? → Add proof posts before outreach
    □ Targeting wrong accounts? → Target 1k–20k followers (they have budget + pain)
    □ Following up? → 80% of closes happen after follow-up #2 or #3

  WHEN CONTENT ISN'T WORKING:
    □ Save rate under 3%? → Shift to education/checklist content immediately
    □ Views declining? → Test new posting times, use trending audio, increase hook strength
    □ Engagement dropping? → Add more specific CTAs, ask questions in captions
    □ No DMs? → Every post needs a specific DM CTA ("DM '[WORD]' for...")
    □ Views fine but no leads? → Content is too broad; niche down the hook

  WHEN TO PIVOT NICHES:
    After 90 days with consistent posting + outreach:
    If average save rate < 2% across all content → content-market fit issue → try different format
    If outreach gets <5% response rate → positioning issue → audit your DM script

  WHEN TO ADD PREMIUM TIER:
    □ Waitlist of 2+ clients
    □ Close rate consistently above 70%
    □ Clients getting exceptional results (3× DM increase+)
    □ Current capacity maxed out

  WHEN TO HIRE:
    Hire VA: When you're spending >10 hrs/week on editing and scheduling
    Hire Editor: When you have 5+ clients and quality control is slipping
    Hire Account Manager: When clients feel under-serviced, or you're losing deals due to time

