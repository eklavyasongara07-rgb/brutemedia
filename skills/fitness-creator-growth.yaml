  ── 10 CTA FORMATS ──

  1.  DIRECT DM: "DM me '[KEYWORD]' and I'll send you [specific resource]."
      Example: "DM me 'FORM CHECK' and I'll send you a free video critique of your squat."

  2.  LINK-IN-BIO: "Full guide in bio — grab it before I take it down."
      Trigger: Scarcity + immediate value.

  3.  COMMENT TRIGGER: "Comment '[WORD]' below and I'll DM you the [resource]."
      Example: "Comment 'PLAN' and I'll DM you the exact 4-week fat loss template."
      Benefit: Boosts comment rate → algorithm signal.

  4.  SAVE PROMPT: "Save this post — you'll need it next week."
      Use after a framework, checklist, or multi-step guide.

  5.  CONSULTATION HOOK: "Want me to do this for your account? DM me 'AUDIT'."
      Best for service-based coaches and agencies.

  6.  POLL/QUESTION: "Which is your biggest struggle? A) Fat loss B) Muscle gain. Comment below."
      Drives comments + qualifies leads simultaneously.

  7.  URGENCY/SCARCITY: "Taking on 2 more clients this month. DM me 'READY' if you're serious."
      Works for coaches with limited capacity.

  8.  SOCIAL PROOF BRIDGE: "My client [First Name] got [result] in [timeframe]. Reply if you want the same."
      Transitions from transformation post to consultation inquiry.

  9.  RISK REVERSAL: "Try it for 30 days. If you don't see results, I'll give you a full refund."
      Lowers barrier to commitment.

  10. VALUE-FIRST OFFER: "I'll do a free 15-minute Instagram audit for 3 coaches this week. DM me 'AUDIT'."
      Entry-point offer for cold prospects.

  PSYCHOLOGICAL TRIGGERS BEHIND CTAs:
    - Curiosity gap: Promise a specific outcome you haven't revealed yet.
    - Reciprocity: Give value first, then ask.
    - Social proof: Reference others who've done it.
    - Scarcity: Limit availability.
    - Specificity: Concrete numbers/keywords increase response rate 3x.
    - Risk reversal: Remove fear of commitment.
    - Identity alignment: "If you're serious about X, then Y."

  ────────────────────────────────────────────────────────────────────────────
  SECTION 2 — PERFORMANCE METRICS & ANALYTICS
  ────────────────────────────────────────────────────────────────────────────

  REAL METRICS (in order of importance for service-based coaches):
    1. Save Rate        = (Saves / Views) × 100
    2. Share Rate       = (Shares / Views) × 100
    3. DM Rate          = (DMs received / Views) × 100  [manual tracking]
    4. Profile CTR      = (Profile visits / Views) × 100
    5. Comment Rate     = (Comments / Views) × 100
    6. Engagement Rate  = ((Likes + Comments + Shares + Saves) / Views) × 100
    7. Like Rate        = (Likes / Views) × 100

  VANITY METRICS (less predictive of revenue):
    - Total followers
    - Raw likes
    - Raw view counts
    - Impressions without context

  BENCHMARKS:
    Save Rate:     <2% weak | 2–5% average | 5–10% good | 10%+ excellent
    Share Rate:    <1% weak | 1–3% average | 3–5% good  | 5%+ excellent
    Comment Rate:  <0.5% weak | 0.5–1.5% average | 1.5–3% good | 3%+ excellent
    Engagement:    <2% weak | 2–5% average | 5–10% good | 10%+ excellent
    Profile CTR:   <1% weak | 1–3% average | 3–5% good  | 5%+ excellent

  CONTENT PERFORMANCE BY CATEGORY (save rate):
    Quick Wins / Checklists:    7–15%
    Insider Knowledge:          8–14%
    Education / Step-by-step:   6–12%
    Transformation/Proof:       4–8%
    Behind the Scenes:          2–5%
    Motivation:                 1–3%
    Entertainment/Trends:       0.5–2%

  CONVERSION FUNNEL MATH:
    10,000 views × 5% save rate  = 500 saves/month
    500 saves × 10% DM rate      = 50 DMs/month
    50 DMs  × 20% call book rate = 10 consultation calls
    10 calls × 30% close rate    = 3 new clients
    3 clients × $1,200           = $3,600 MRR per 10k monthly views

  REVENUE PROJECTION FORMULA:
    Monthly Reach (views) × Save Rate × DM Conversion × Call Book × Close Rate × Price
    = Monthly Revenue from Instagram

  CHURN PREDICTION FLAGS:
    - Client stops responding to weekly check-ins
    - Month 1 results below projection by >30%
    - Client questions strategy before data accumulates (< 3 weeks in)
    - Client compares to competitor content without context
    RESPONSE: Pre-empt with 2-week check-in call, share leading indicators (saves trending up).

  ────────────────────────────────────────────────────────────────────────────
  SECTION 3 — PRICING & BUSINESS MODEL
  ────────────────────────────────────────────────────────────────────────────

  PRICING TIERS:
    Starter:     $600/mo   — 8–10 reels, basic captions, monthly report
    Standard:    $900/mo   — 12 reels, hooks + captions, bi-weekly calls
    Growth:      $1,200/mo — 15 reels, full strategy, weekly calls, audit
    Premium:     $1,500/mo — 15+ reels + carousels, custom strategy, 2× calls
    Elite:       $2,000+/mo — Full content operation (reels, stories, carousels,
                              ads creative, monthly strategy sprint)

  AGENCY MARGIN TARGETS:
    - VA/editor costs: $200–$400/client/month
    - Target gross margin: 60–70%
    - At $1,200: ~$720–$840 gross margin per client
    - At $900: ~$500–$650 gross margin per client

  ROI CALCULATOR FOR CLIENT PITCH:
    If our content generates 3 new coaching clients per month:
      Coach charges $500/mo coaching = $1,500 new MRR
      They pay us $1,200 = net positive $300/mo + compounding growth
    If coach charges $2,000/transformation program:
      3 clients = $6,000 revenue vs $1,200 investment = 5× ROI

  REVENUE SCALING SCENARIOS:
    5 clients  × $1,200 = $6,000 MRR  (1 founder, part-time)
    10 clients × $1,200 = $12,000 MRR (1 VA, 1 editor)
    15 clients × $1,200 = $18,000 MRR (2 VAs, 2 editors, 1 strategist)
    20 clients × $1,200 = $24,000 MRR (team of 5–6, systemized)

  TIERING / UPSELL LOGIC:
    Entry point: Free audit → converts to $600 Starter
    Upsell trigger: Month 2–3 strong results → offer Growth or Premium tier
    Add-on revenue: Story management (+$200), Ad creative (+$300), Email newsletter (+$150)

  WHEN TO RAISE PRICES:
    - Consistently closing >80% of proposals at current price
    - Waitlist forming (2+ prospects waiting)
    - Delivering consistently above benchmark results
    - Personal brand / case studies building authority
    Rule: Raise by $200–$300 increments, grandfather existing clients.

  ────────────────────────────────────────────────────────────────────────────
  SECTION 4 — SALES & LEAD GENERATION
  ────────────────────────────────────────────────────────────────────────────

