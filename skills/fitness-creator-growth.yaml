  SECTION 11 — COMPETITIVE ANALYSIS & POSITIONING
  ────────────────────────────────────────────────────────────────────────────

  COMPETITOR AUDIT FRAMEWORK:
    1. Pull their last 15 reels
    2. Note content mix (education / transformation / motivation ratio)
    3. Estimate save rates from like:comment ratio patterns
    4. Analyse their CTAs (specific vs vague)
    5. Note what they're NOT doing (gaps = your opportunity)
    6. Identify their positioning (budget / premium / niche-specific)

  DIFFERENTIATION TACTICS:
    - Niche down by sport (powerlifting, CrossFit, running, etc.)
    - Niche down by audience (women 40+, beginners, elite athletes)
    - Niche down by geography (UK-specific, India-specific)
    - Own a unique process name ("The Brute Growth Framework")
    - Lead with data others aren't sharing (benchmarks, funnel math)
    - Offer a free audit as entry point (competitors usually don't)

  BLUE OCEAN POSITIONING:
    Most agencies: "We make you look good on social."
    Brute Media positioning: "We turn your Instagram into a lead machine.
    Measured in DMs, consultations, and clients — not likes."

  ────────────────────────────────────────────────────────────────────────────
  SECTION 12 — SCALING PATH & STAGE-BASED PRIORITIES
  ────────────────────────────────────────────────────────────────────────────

  MONTH 1–3 (PROOF STAGE — 0 → 3 CLIENTS):
    Priority: Close first paying clients
    Bottleneck: Outreach volume and proof
    KPI: DMs sent/day (target 30–50), calls booked/week (target 2–3), close rate
    Strategy: Offer audit-first approach, reduce-risk entry offer, over-deliver
    DO NOT: Build agency Instagram, create fancy decks, optimize ops
    DO: Send DMs, do calls, close, deliver exceptional results

  MONTH 4–6 (REFERRAL STAGE — 3 → 8 CLIENTS):
    Priority: Referrals from happy clients
    Bottleneck: Case studies + retention
    KPI: Referral rate, client NPS, Month 2 retention
    Strategy: Ask every happy client for a referral at 45-day mark
    DO: Build simple results page, start agency Instagram with case studies

  MONTH 7–12 (SYSTEMATIZE STAGE — 8 → 15 CLIENTS):
    Priority: Reduce founder dependency
    Bottleneck: Operations, team quality
    KPI: Reel delivery time, client satisfaction, margin per client
    Strategy: Hire VA + editor, create SOPs, move to weekly strategy calls vs daily
    DO: Raise prices for new clients, keep current clients grandfathered

  MONTH 12+ (OPTIMIZATION STAGE — 15+ CLIENTS):
    Priority: Inbound lead generation + margin
    Bottleneck: Quality at scale
    KPI: Inbound DMs to agency page, client LTV, team performance
    Strategy: Agency Instagram becomes lead magnet, podcast/collab outreach
    DO: Add premium tier, niching to specific audience, productized offer

  TEAM EXPANSION GUIDE:
    Client 1–4: Founder only
    Client 5–8: 1 video editor ($200–400/client/month)
    Client 9–12: 1 VA (scheduling, captions, comms) + 1–2 editors
    Client 13–18: Account manager / strategist ($1,500–2,000/month salary)
    Client 19+: Ops manager, lead strategist, 3–4 editors

